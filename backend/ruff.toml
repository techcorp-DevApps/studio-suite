# Ruff configuration for the studio-suite backend.
target-version = "py311"
line-length = 100

[lint]
# pycodestyle (E, W), pyflakes (F), isort (I), pyupgrade (UP), flake8-bugbear (B).
select = ["E", "W", "F", "I", "UP", "B"]

[lint.per-file-ignores]
# Tests intentionally import after env setup and use fixtures liberally.
"tests/*" = ["E402"]
