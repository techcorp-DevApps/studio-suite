<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Illuminate Studios — Client Portal</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body style="background-color: rgb(254, 252, 248)">
  <div id="root"></div>

  <!-- Tweak defaults — edited in place by the host when user changes knobs. -->
  <script>
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "adminBgTone": "cool",
      "adminTextStyle": "navy",
      "adminGoldIntensity": "standard",
      "adminDensity": "regular",
      "adminAccentHue": "#a8884f"
    }/*EDITMODE-END*/;
  </script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
          integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
          integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>

  <!-- App files, loaded in order -->
  <script type="text/babel" data-presets="env,react" src="data.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="components.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="tweaks-panel.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="landing.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="pricing.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="client.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="admin.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="tweaks.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="app.jsx"></script>
</body>
</html>
