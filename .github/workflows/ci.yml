# INFRA — Continuous integration for the studio-suite monorepo.
# Reviewed as infrastructure, not application code.
#
# Two independent, required jobs run on every pull request to main:
#   backend — ruff lint + pytest      (working dir: backend/)
#   web     — eslint + production build (working dir: web/)

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies (prod + dev)
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

  web:
    name: web (eslint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies (with dev deps — Vite is a devDependency)
        run: npm ci --include=dev

      - name: Lint (eslint)
        run: npm run lint

      - name: Build (vite)
        run: npm run build
